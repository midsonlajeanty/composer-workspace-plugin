name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-*"
            - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: "8.3"
                  coverage: none

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Run tests
              run: composer test

            - name: Generate Changelog
              id: changelog
              uses: metcalfc/changelog-generator@0440d0932f9a0dd1cc9ecd8412830761351323bd # v4.7.0
              with:
                  myToken: ${{ secrets.GITHUB_TOKEN }}

            - name: Update CHANGELOG.md
              env:
                  NOTES: ${{ steps.changelog.outputs.changelog }}
              run: |
                  # Use environment variable to avoid shell injection
                  VERSION="${GITHUB_REF_NAME}"
                  DATE=$(date +%Y-%m-%d)

                  if [ ! -f CHANGELOG.md ]; then
                    echo "# Changelog" > CHANGELOG.md
                    echo "" >> CHANGELOG.md
                    echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
                    echo "" >> CHANGELOG.md
                    echo "## [Unreleased]" >> CHANGELOG.md
                    echo "" >> CHANGELOG.md
                  fi

                  TEMP_FILE=$(mktemp)
                  echo "## [$VERSION] - $DATE" > "$TEMP_FILE"
                  echo "" >> "$TEMP_FILE"
                  # Use printf or heredoc to safely handle the environment variable
                  printf "%s\n" "$NOTES" >> "$TEMP_FILE"
                  echo "" >> "$TEMP_FILE"

                  if grep -q "## \\[Unreleased\\]" CHANGELOG.md; then
                      # Insert after Unreleased
                      sed -i "/## \\[Unreleased\\]/r $TEMP_FILE" CHANGELOG.md
                      # Add a newline if needed
                      sed -i "/## \\[Unreleased\\]/a \\\\" CHANGELOG.md
                  else
                      # Insert after header
                      sed -i "4r $TEMP_FILE" CHANGELOG.md
                  fi

            - name: Commit CHANGELOG.md
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
              with:
                  commit_message: "docs: update CHANGELOG.md for ${{ github.ref_name }}"
                  file_pattern: 'CHANGELOG.md'
                  branch: main

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  version="${GITHUB_REF_NAME#v}"
                  constraint="^${version}"
                  flags=(--generate-notes)

                  if [[ "$GITHUB_REF_NAME" == *-* ]]; then
                      flags+=(--prerelease)
                      constraint="${version}"
                  fi

                  cat > "$RUNNER_TEMP/release-body.md" <<EOF
                  **Bun-style monorepo workspaces for Composer** - auto-registered path repositories and fan-out commands across every member.

                  ## Installation

                  \`\`\`bash
                  composer global require midsonlajeanty/composer-workspace-plugin:"${constraint}"
                  composer global config allow-plugins.midsonlajeanty/composer-workspace-plugin true
                  \`\`\`

                  See the [README](https://github.com/midsonlajeanty/composer-workspace-plugin#readme) for workspace setup and fan-out commands.
                  EOF

                  gh release create "$GITHUB_REF_NAME" \
                      --title "$GITHUB_REF_NAME" \
                      --notes-file "$RUNNER_TEMP/release-body.md" \
                      "${flags[@]}"
